  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: innovatech-frontend
    labels:
      app: innovatech-frontend
  spec:
    replicas: 2
    selector:
      matchLabels:
        app: innovatech-frontend
    template:
      metadata:
        labels:
          app: innovatech-frontend
      spec:
        containers:
        - name: frontend
          image: 003486653797.dkr.ecr.us-east-1.amazonaws.com/innovatech-frontend:latest
          ports:
          - containerPort: 80
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
  ---
  apiVersion: v1
  kind: Service
  metadata:
    name: innovatech-frontend-service
  spec:
    type: LoadBalancer 
    ports:
    - port: 80
      targetPort: 80
    selector:
      app: innovatech-frontend